name: Environment Variables
on: 
  workflow_dispatch: 
env:
  WORKFLOW_VAR: I_AM_WORKFLOW_SCOPED
jobs:
  job-1:
    runs-on: ubuntu-24.04
    env:
      JOB_VAR: I_AM_JOB-1_SCOPED
    steps:
      - name: Inspect scopes job 1 step 1
        env:
          STEP_VAR : I_AM_STEP_SCOPED
        run: |
          echo "WORKFLOW_VAR: $WORKFLOW_VAR"
          echo "JOB_VAR: $JOB_VAR"
          echo "STEP_VAR: $STEP_VAR"
      - name: Inspect scope job 1 step 2
        run: |
          echo "WORKFLO_VAR: $WORKFLOW_VAR""
          echo "JOB_VAR: $JOB_VAR""
          echo "STEP_VAR: $STEP_VAR""

  job-2:
    runs-on: ubuntu-22.04
    steps:
      - name: Inspect scopes job2 step 2
        run: |
          echo "WORKFLO_VAR: $WORKFLOW_VAR"
          echo "JOB_VAR: $JOB_VAR"
          echo "STEP_VAR: $STEP_VAR"