name:  Workflow, Jobs, and Steps.
on:
  workflow_dispatch: 

jobs:
  job-1:
    runs-on: ubuntu-22.04
    steps:
      - run: echo "A job consiste of"
      - run: echo "one or more steps"
      - run: echo "Which run secuencly"
      - run: echo "within the same compute environmet"
  job-2:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "multiple jobs can run in parallel"
  job-3:
    runs-on: ubuntu-24.04
    needs: 
      - job-1
      - job-2
    steps:
      - run: echo "They also can be depends on  one another..."
  job-4:
    runs-on: ubuntu-24.04
    needs: 
      - job-2
      - job-3
    steps:
      - run: echo "... to form a directed acyclic graph(DAG)"